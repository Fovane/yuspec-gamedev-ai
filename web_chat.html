<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yuspec GameDev Chat</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #171a1f;
      --panel-2: #1f242b;
      --text: #edf0f3;
      --muted: #9ca7b3;
      --line: #2b323b;
      --accent: #4da3ff;
      --accent-2: #37c58a;
      --danger: #ff6b6b;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 650;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    select,
    input,
    button,
    textarea {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 6px;
      font: inherit;
    }

    select,
    input {
      height: 36px;
      padding: 0 10px;
    }

    label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    main {
      overflow-y: auto;
      padding: 20px;
    }

    .messages {
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 14px;
      white-space: pre-wrap;
      line-height: 1.45;
    }

    .msg.user {
      background: #16202b;
      border-color: #24415e;
    }

    .meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      border: 1px solid var(--line);
      background: #12161b;
      padding: 2px 7px;
      border-radius: 999px;
    }

    .pill.good {
      color: var(--accent-2);
      border-color: rgba(55, 197, 138, 0.5);
    }

    .pill.warn {
      color: var(--accent);
      border-color: rgba(77, 163, 255, 0.5);
    }

    pre {
      overflow-x: auto;
      background: #0b0d10;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      white-space: pre;
    }

    footer {
      border-top: 1px solid var(--line);
      background: var(--panel);
      padding: 14px 18px;
    }

    .composer {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    textarea {
      min-height: 58px;
      max-height: 180px;
      resize: vertical;
      padding: 12px;
      outline: none;
    }

    button {
      min-width: 96px;
      height: 42px;
      padding: 0 16px;
      cursor: pointer;
      background: var(--accent);
      color: #06111d;
      border-color: transparent;
      font-weight: 650;
    }

    button.secondary {
      background: var(--panel-2);
      color: var(--text);
      border-color: var(--line);
      min-width: auto;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .error {
      color: var(--danger);
    }

    @media (max-width: 720px) {
      header {
        align-items: stretch;
        flex-direction: column;
      }

      .controls {
        justify-content: stretch;
      }

      select,
      input,
      button.secondary {
        flex: 1;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Yuspec GameDev Chat</h1>
      <div class="controls">
        <label>
          Domain
          <select id="domain">
            <option value="unity">Unity</option>
            <option value="unreal">Unreal</option>
            <option value="godot">Godot</option>
            <option value="general">General</option>
          </select>
        </label>
        <label>
          Mode
          <select id="mode">
            <option value="generate">Generate</option>
            <option value="search">Search</option>
          </select>
        </label>
        <label>
          Tokens
          <input id="tokens" type="number" min="80" max="900" step="20" value="360" />
        </label>
        <button class="secondary" id="clear">Clear</button>
      </div>
    </header>

    <main id="scroll">
      <div class="messages" id="messages">
        <div class="msg">
          <div class="meta">
            <span class="pill good">ready</span>
            <span>http://127.0.0.1:8008</span>
          </div>
          Unity, Unreal, Godot veya proje kodların hakkında soru yaz.
        </div>
      </div>
    </main>

    <footer>
      <form class="composer" id="form">
        <textarea id="prompt" placeholder="Örn: PlayerHealth içinde TakeDamage nerede?"></textarea>
        <button id="send" type="submit">Send</button>
      </form>
    </footer>
  </div>

  <script>
    const API = "http://127.0.0.1:8008";
    const messages = document.querySelector("#messages");
    const scroll = document.querySelector("#scroll");
    const form = document.querySelector("#form");
    const promptEl = document.querySelector("#prompt");
    const send = document.querySelector("#send");
    const clear = document.querySelector("#clear");
    const domainEl = document.querySelector("#domain");
    const modeEl = document.querySelector("#mode");
    const tokensEl = document.querySelector("#tokens");

    function addMessage(role, text, meta = []) {
      const box = document.createElement("div");
      box.className = `msg ${role}`;

      if (meta.length) {
        const m = document.createElement("div");
        m.className = "meta";
        for (const item of meta) {
          const pill = document.createElement("span");
          pill.className = `pill ${item.kind || ""}`;
          pill.textContent = item.text;
          m.appendChild(pill);
        }
        box.appendChild(m);
      }

      const content = document.createElement("div");
      content.textContent = text;
      box.appendChild(content);
      messages.appendChild(box);
      scroll.scrollTop = scroll.scrollHeight;
      return box;
    }

    function formatSearch(data) {
      if (!data.matches || data.matches.length === 0) {
        return "Eşleşen kaynak bulunamadı.";
      }
      return data.matches.map((m, i) => {
        return `#${i + 1} ${m.source} (${m.type || "file"}) score=${m.score}\n\n${m.preview}`;
      }).join("\n\n---\n\n");
    }

    async function ask(prompt) {
      const domain = domainEl.value;
      const mode = modeEl.value;
      const maxTokens = Number(tokensEl.value || 360);
      const url = `${API}/${mode}`;
      const payload = {
        domain,
        prompt,
        max_new_tokens: maxTokens,
        temperature: 0.25,
        top_k: 20,
        snippet_limit: 3
      };

      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.detail || data.error || res.statusText);
      }

      if (mode === "search") {
        return {
          text: formatSearch(data),
          meta: [{ text: "search", kind: "warn" }, { text: domain }]
        };
      }

      const meta = [
        { text: data.mode || "model", kind: data.mode === "retrieval" || data.mode === "snippet_retrieval" ? "good" : "warn" },
        { text: domain }
      ];
      if (data.matched_instruction) {
        meta.push({ text: "matched" });
      }
      return { text: data.answer || "", meta };
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const prompt = promptEl.value.trim();
      if (!prompt) return;

      addMessage("user", prompt, [{ text: domainEl.value }, { text: modeEl.value }]);
      promptEl.value = "";
      send.disabled = true;
      const pending = addMessage("assistant", "Yazıyor...", [{ text: "pending", kind: "warn" }]);

      try {
        const result = await ask(prompt);
        pending.remove();
        addMessage("assistant", result.text, result.meta);
      } catch (err) {
        pending.remove();
        addMessage("assistant", err.message, [{ text: "error", kind: "error" }]).classList.add("error");
      } finally {
        send.disabled = false;
        promptEl.focus();
      }
    });

    promptEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });

    clear.addEventListener("click", () => {
      messages.innerHTML = "";
    });
  </script>
</body>
</html>
