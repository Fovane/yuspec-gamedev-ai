model:
  name: yuspec-gamedev-10m-v0.2-instruction-ft
  vocab_size: 16000
  block_size: 1024
  n_layer: 8
  n_head: 4
  n_embd: 256
  dropout: 0.1
  bias: false

training:
  batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 0.00008
  min_lr: 0.000008
  weight_decay: 0.1
  max_iters: 2000
  warmup_iters: 100
  eval_interval: 250
  save_interval: 500
  eval_iters: 10
  out_dir: checkpoints/godot_docs_instruction_v2

data:
  train_bin: data/tokens_instruction_v2/train.bin
  val_bin: data/tokens_instruction_v2/val.bin
  tokenizer_path: tokenizer/tokenizer.json
