model:
  name: yuspec-gamedev-60m-github-issue-distill-v1
  vocab_size: 16000
  block_size: 1024
  n_layer: 16
  n_head: 8
  n_embd: 512
  dropout: 0.1
  bias: false

training:
  batch_size: 1
  gradient_accumulation_steps: 12
  learning_rate: 0.00016
  min_lr: 0.000016
  weight_decay: 0.1
  max_iters: 2500
  warmup_iters: 150
  eval_interval: 250
  save_interval: 500
  eval_iters: 12
  use_amp: true
  out_dir: checkpoints/github_issue_distill_60m_v1

data:
  train_bin: data/tokens_github_issue_distill_v1/train.bin
  val_bin: data/tokens_github_issue_distill_v1/val.bin
  tokenizer_path: tokenizer/tokenizer.json
