model:
  name: yuspec-gamedev-10m-smoke
  vocab_size: 16000
  block_size: 128
  n_layer: 2
  n_head: 2
  n_embd: 128
  dropout: 0.1
  bias: false

training:
  batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 0.0003
  min_lr: 0.00003
  weight_decay: 0.1
  max_iters: 5
  warmup_iters: 1
  eval_interval: 5
  save_interval: 5
  eval_iters: 2
  out_dir: checkpoints/smoke

data:
  train_bin: data/tokens/train.bin
  val_bin: data/tokens/val.bin
  tokenizer_path: tokenizer/tokenizer.json
