model:
  name: yuspec-gamedev-10m-mmorpg-unreal-examples-realign-v1
  vocab_size: 16000
  block_size: 1024
  n_layer: 8
  n_head: 4
  n_embd: 256
  dropout: 0.1
  bias: false

training:
  batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 0.00002
  min_lr: 0.000006
  weight_decay: 0.1
  max_iters: 600
  warmup_iters: 50
  eval_interval: 150
  save_interval: 300
  eval_iters: 10
  out_dir: checkpoints/mmorpg_unreal_examples_realign_v1

data:
  train_bin: data/tokens_multiengine_v2/train.bin
  val_bin: data/tokens_multiengine_v2/val.bin
  tokenizer_path: tokenizer/tokenizer.json
