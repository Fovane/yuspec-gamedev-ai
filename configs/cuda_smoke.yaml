model:
  name: yuspec-gamedev-10m-cuda-smoke
  vocab_size: 16000
  block_size: 1024
  n_layer: 8
  n_head: 4
  n_embd: 256
  dropout: 0.1
  bias: false

training:
  batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 0.0003
  min_lr: 0.00003
  weight_decay: 0.1
  max_iters: 2
  warmup_iters: 1
  eval_interval: 2
  save_interval: 2
  eval_iters: 1
  out_dir: checkpoints/cuda_smoke

data:
  train_bin: data/tokens/train.bin
  val_bin: data/tokens/val.bin
  tokenizer_path: tokenizer/tokenizer.json
