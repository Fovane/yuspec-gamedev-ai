model:
  name: yuspec-gamedev-10m-github-issue-distill-v1
  vocab_size: 16000
  block_size: 1024
  n_layer: 8
  n_head: 4
  n_embd: 256
  dropout: 0.06
  bias: false

training:
  batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 0.000010
  min_lr: 0.000003
  weight_decay: 0.06
  max_iters: 900
  warmup_iters: 80
  eval_interval: 100
  save_interval: 300
  eval_iters: 12
  use_amp: true
  out_dir: checkpoints/github_issue_distill_10m_v1

data:
  train_bin: data/tokens_github_issue_distill_v1/train.bin
  val_bin: data/tokens_github_issue_distill_v1/val.bin
  tokenizer_path: tokenizer/tokenizer.json
