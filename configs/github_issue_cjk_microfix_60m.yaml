model:
  name: yuspec-gamedev-60m-github-issue-cjk-microfix-v4
  vocab_size: 16000
  block_size: 1024
  n_layer: 16
  n_head: 8
  n_embd: 512
  dropout: 0.03
  bias: false

training:
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.000025
  min_lr: 0.000005
  weight_decay: 0.03
  max_iters: 420
  warmup_iters: 40
  eval_interval: 70
  save_interval: 140
  eval_iters: 8
  use_amp: true
  out_dir: checkpoints/github_issue_cjk_microfix_60m_v4

data:
  train_bin: data/tokens_github_issue_cjk_microfix_v4/train.bin
  val_bin: data/tokens_github_issue_cjk_microfix_v4/val.bin
  tokenizer_path: tokenizer/tokenizer.json
