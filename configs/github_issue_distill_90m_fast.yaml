model:
  name: yuspec-gamedev-90m-github-issue-distill-v1-fast
  vocab_size: 16000
  block_size: 1024
  n_layer: 16
  n_head: 8
  n_embd: 640
  dropout: 0.1
  bias: false

training:
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.00014
  min_lr: 0.000014
  weight_decay: 0.1
  max_iters: 700
  warmup_iters: 100
  eval_interval: 140
  save_interval: 280
  eval_iters: 8
  use_amp: true
  out_dir: checkpoints/github_issue_distill_90m_v1_fast

data:
  train_bin: data/tokens_github_issue_distill_v1/train.bin
  val_bin: data/tokens_github_issue_distill_v1/val.bin
  tokenizer_path: tokenizer/tokenizer.json
