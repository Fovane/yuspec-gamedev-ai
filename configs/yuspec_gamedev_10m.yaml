model:
  name: yuspec-gamedev-10m-v0.1
  vocab_size: 16000
  block_size: 1024
  n_layer: 8
  n_head: 4
  n_embd: 256
  dropout: 0.1
  bias: false

training:
  batch_size: 24
  gradient_accumulation_steps: 4
  learning_rate: 0.0003
  min_lr: 0.00003
  weight_decay: 0.1
  max_iters: 100000
  warmup_iters: 2000
  eval_interval: 1000
  save_interval: 5000
  eval_iters: 50
  out_dir: checkpoints

data:
  train_bin: data/tokens/train.bin
  val_bin: data/tokens/val.bin
  tokenizer_path: tokenizer/tokenizer.json
