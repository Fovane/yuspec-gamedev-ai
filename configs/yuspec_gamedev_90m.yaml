model:
  name: yuspec-gamedev-90m-experimental
  vocab_size: 16000
  block_size: 1024
  n_layer: 16
  n_head: 8
  n_embd: 640
  dropout: 0.1
  bias: false

training:
  batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.00016
  min_lr: 0.000016
  weight_decay: 0.1
  max_iters: 5000
  warmup_iters: 250
  eval_interval: 250
  save_interval: 500
  eval_iters: 16
  use_amp: true
  out_dir: checkpoints/yuspec_gamedev_90m

data:
  train_bin: data/tokens_benchmark_realign_v4/train.bin
  val_bin: data/tokens_benchmark_realign_v4/val.bin
  tokenizer_path: tokenizer/tokenizer.json
