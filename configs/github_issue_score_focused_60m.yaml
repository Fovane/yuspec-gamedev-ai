model:
  name: yuspec-gamedev-60m-github-issue-score-focused-v2
  vocab_size: 16000
  block_size: 1024
  n_layer: 16
  n_head: 8
  n_embd: 512
  dropout: 0.08
  bias: false

training:
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.000030
  min_lr: 0.000006
  weight_decay: 0.08
  max_iters: 850
  warmup_iters: 80
  eval_interval: 100
  save_interval: 250
  eval_iters: 10
  use_amp: true
  out_dir: checkpoints/github_issue_score_focused_60m_v2

data:
  train_bin: data/tokens_github_issue_score_focused_v2/train.bin
  val_bin: data/tokens_github_issue_score_focused_v2/val.bin
  tokenizer_path: tokenizer/tokenizer.json
