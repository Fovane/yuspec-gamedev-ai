model:
  name: yuspec-gamedev-60m-direct-game-commands-v1
  vocab_size: 16000
  block_size: 1024
  n_layer: 16
  n_head: 8
  n_embd: 512
  dropout: 0.06
  bias: false

training:
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.000026
  min_lr: 0.000005
  weight_decay: 0.06
  max_iters: 900
  warmup_iters: 80
  eval_interval: 100
  save_interval: 300
  eval_iters: 10
  use_amp: true
  out_dir: checkpoints/direct_game_commands_60m_v1

data:
  train_bin: data/tokens_direct_game_commands_v1/train.bin
  val_bin: data/tokens_direct_game_commands_v1/val.bin
  tokenizer_path: tokenizer/tokenizer.json
