model:
  name: yuspec-gamedev-28m
  vocab_size: 16000
  block_size: 1024
  n_layer: 12
  n_head: 6
  n_embd: 384
  dropout: 0.1
  bias: false

training:
  batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 0.00025
  min_lr: 0.000025
  weight_decay: 0.1
  max_iters: 3000
  warmup_iters: 150
  eval_interval: 250
  save_interval: 500
  eval_iters: 20
  use_amp: true
  out_dir: checkpoints/yuspec_gamedev_28m

data:
  train_bin: data/tokens_benchmark_realign_v4/train.bin
  val_bin: data/tokens_benchmark_realign_v4/val.bin
  tokenizer_path: tokenizer/tokenizer.json
