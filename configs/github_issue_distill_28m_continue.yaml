model:
  name: yuspec-gamedev-28m-github-issue-distill-v1-continue
  vocab_size: 16000
  block_size: 1024
  n_layer: 12
  n_head: 6
  n_embd: 384
  dropout: 0.08
  bias: false

training:
  batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 0.000045
  min_lr: 0.000008
  weight_decay: 0.08
  max_iters: 900
  warmup_iters: 80
  eval_interval: 150
  save_interval: 300
  eval_iters: 16
  use_amp: true
  out_dir: checkpoints/github_issue_distill_28m_v1_continue

data:
  train_bin: data/tokens_github_issue_distill_v1/train.bin
  val_bin: data/tokens_github_issue_distill_v1/val.bin
  tokenizer_path: tokenizer/tokenizer.json
