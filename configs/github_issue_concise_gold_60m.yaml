model:
  name: yuspec-gamedev-60m-github-issue-concise-gold-v3
  vocab_size: 16000
  block_size: 1024
  n_layer: 16
  n_head: 8
  n_embd: 512
  dropout: 0.04
  bias: false

training:
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.000040
  min_lr: 0.000006
  weight_decay: 0.04
  max_iters: 700
  warmup_iters: 60
  eval_interval: 100
  save_interval: 250
  eval_iters: 8
  use_amp: true
  out_dir: checkpoints/github_issue_concise_gold_60m_v3

data:
  train_bin: data/tokens_github_issue_concise_gold_v3/train.bin
  val_bin: data/tokens_github_issue_concise_gold_v3/val.bin
  tokenizer_path: tokenizer/tokenizer.json
